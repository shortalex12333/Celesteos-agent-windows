name: Build Windows EXE

on:
  workflow_dispatch:
    inputs:
      yacht_id:
        description: 'Yacht ID (UUID from new_client.sql output)'
        required: true
        type: string

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Inno Setup
        run: choco install innosetup --yes --no-progress

      - name: Install dependencies
        run: |
          pip install pyinstaller
          pip install -r installer/build/requirements-win.txt
          pip install cryptography httpx

      - name: Build EXE
        env:
          SUPABASE_SERVICE_KEY: ${{ secrets.MASTER_SUPABASE_SERVICE_KEY }}
          TENANT_SUPABASE_SERVICE_KEY: ${{ secrets.TENANT_SUPABASE_SERVICE_KEY }}
          REGISTRATION_API_ENDPOINT: ${{ secrets.REGISTRATION_API_ENDPOINT }}
          CELESTEOS_AGENT_SOURCE: ${{ github.workspace }}
          CELESTEOS_OUTPUT_DIR: ${{ github.workspace }}/output
        run: |
          cd installer/build
          python build_exe.py "${{ inputs.yacht_id }}" --no-upload

      - name: Upload EXE to Supabase Storage
        if: always()
        shell: bash
        env:
          SUPABASE_SERVICE_KEY: ${{ secrets.MASTER_SUPABASE_SERVICE_KEY }}
        run: |
          EXE_FILE=$(ls output/CelesteOS-Setup-*.exe 2>/dev/null || ls output/CelesteOS-*.zip 2>/dev/null || echo "")
          if [ -z "$EXE_FILE" ]; then
            echo "::warning::No installer file found in output/"
            exit 0
          fi

          YACHT_ID="${{ inputs.yacht_id }}"
          FILENAME=$(basename "$EXE_FILE")
          STORAGE_PATH="exe/${YACHT_ID}/${FILENAME}"
          CONTENT_TYPE="application/octet-stream"

          HTTP_CODE=$(curl -s -o /tmp/upload_response.txt -w "%{http_code}" \
            -X POST \
            "${SUPABASE_URL:-https://qvzmkaamzaqxpzbewjxe.supabase.co}/storage/v1/object/installers/${STORAGE_PATH}" \
            -H "apikey: ${SUPABASE_SERVICE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_KEY}" \
            -H "Content-Type: ${CONTENT_TYPE}" \
            -H "x-upsert: true" \
            --data-binary "@${EXE_FILE}" \
            --max-time 120)

          if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "201" ]; then
            echo "Uploaded to Supabase Storage: ${STORAGE_PATH}"
          else
            echo "::warning::Supabase Storage upload failed (HTTP ${HTTP_CODE}). EXE is still available as a GitHub artifact."
            cat /tmp/upload_response.txt
          fi

      - name: Upload as artifact
        uses: actions/upload-artifact@v4
        with:
          name: CelesteOS-${{ inputs.yacht_id }}-win
          path: |
            output/CelesteOS-Setup-*.exe
            output/CelesteOS-*.zip
          retention-days: 30

      - name: Summary
        shell: bash
        run: |
          EXE_FILE=$(ls output/CelesteOS-Setup-*.exe 2>/dev/null || ls output/CelesteOS-*.zip 2>/dev/null || echo "none")
          if [ "$EXE_FILE" != "none" ]; then
            EXE_SIZE=$(du -h "$EXE_FILE" | cut -f1)
            EXE_SHA=$(sha256sum "$EXE_FILE" | cut -d' ' -f1)
            echo "## Windows Build Complete" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
            echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
            echo "| Yacht ID | \`${{ inputs.yacht_id }}\` |" >> $GITHUB_STEP_SUMMARY
            echo "| Installer | \`$(basename $EXE_FILE)\` |" >> $GITHUB_STEP_SUMMARY
            echo "| Size | $EXE_SIZE |" >> $GITHUB_STEP_SUMMARY
            echo "| SHA-256 | \`${EXE_SHA:0:16}...\` |" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Installer is available as a build artifact. Download from the Artifacts section below." >> $GITHUB_STEP_SUMMARY
          fi
